spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # Flyway uses Postgres-specific syntax; H2 uses ddl-auto instead

payment:
  retry:
    max-attempts: 2
    initial-interval-ms: 10
    multiplier: 1.5
    max-interval-ms: 100
  idempotency:
    ttl-hours: 1
